<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk ZIP to PDF Converter</title>
    <!-- Library Diperlukan -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --p: #4F46E5; --p-h: #4338CA; --bg: #F3F4F6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        
        /* Dropzone Styling */
        .dropzone {
            border: 2px dashed #E5E7EB; border-radius: 1rem; padding: 2rem;
            transition: all 0.2s ease; cursor: pointer; position: relative; background: #FAFBFC;
        }
        .dropzone:hover, .dropzone.dragover { border-color: var(--p); background: #EEF2FF; }
        .dropzone svg { width: 50px; height: 50px; color: var(--p); margin-bottom: 1rem; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        
        /* Progress & UI */
        .progress-container { margin-top: 1.5rem; display: none; }
        .progress-bar { height: 8px; background: #E5E7EB; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--p); width: 0%; transition: width 0.3s; }
        
        button {
            margin-top: 1.5rem; background: var(--p); color: white; border: none;
            padding: 0.8rem; border-radius: 0.6rem; font-weight: 600; width: 100%;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--p-h); transform: translateY(-1px); }
        button:disabled { background: #9CA3AF; cursor: not-allowed; }
        #status { margin-top: 1rem; font-size: 0.85rem; color: #4B5563; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin: 0 0 0.5rem 0; text-align: center;">ZIP to PDF</h2>
    <p style="color: #6B7280; text-align: center; margin-bottom: 2rem; font-size: 0.9rem;">Tukar 5 ZIP kepada 5 PDF secara automatik.</p>

    <div class="dropzone" id="dropzone">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        <p id="msg"><strong>Klik/Seret fail ZIP</strong></p>
        <input type="file" id="fileInput" multiple accept=".zip">
    </div>

    <div class="progress-container" id="progCont">
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>

    <button id="btn" onclick="processFiles()">Mula Menukar</button>
    <div id="status">Sedia untuk diproses.</div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    const fileInput = document.getElementById('fileInput');
    const msg = document.getElementById('msg');
    const progCont = document.getElementById('progCont');
    const progFill = document.getElementById('progFill');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');

    fileInput.onchange = () => {
        msg.innerHTML = `<strong>${fileInput.files.length} fail dipilih</strong>`;
    };

    async function processFiles() {
        const files = fileInput.files;
        if (files.length === 0) return alert("Pilih fail dulu bos!");

        // Reset UI
        btn.disabled = true;
        progCont.style.display = 'block';
        
        for (let i = 0; i < files.length; i++) {
            const zipFile = files[i];
            status.innerText = `Memproses: ${zipFile.name}...`;
            
            try {
                const zip = await JSZip.loadAsync(zipFile);
                const doc = new jsPDF();
                let imageCount = 0;

                // Susun fail dalam ZIP ikut nama supaya PDF tak bersepah
                const filenames = Object.keys(zip.files).sort();

                for (const filename of filenames) {
                    if (filename.match(/\.(jpg|jpeg|png)$/i)) {
                        const imgData = await zip.files[filename].async("base64");
                        if (imageCount > 0) doc.addPage();
                        
                        // Logik Auto-Resize Gambar ke A4
                        const imgProps = doc.getImageProperties(`data:image/jpeg;base64,${imgData}`);
                        const pdfW = doc.internal.pageSize.getWidth();
                        const pdfH = (imgProps.height * pdfW) / imgProps.width;
                        
                        doc.addImage(`data:image/jpeg;base64,${imgData}`, 'JPEG', 0, 0, pdfW, pdfH);
                        imageCount++;
                    }
                }

                if (imageCount > 0) {
                    doc.save(zipFile.name.replace(".zip", ".pdf"));
                }
            } catch (e) {
                console.error(e);
            }

            // Update Progress
            const pct = ((i + 1) / files.length) * 100;
            progFill.style.width = pct + '%';
        }

        status.innerText = "✅ Semua 5 fail (atau lebih) telah siap!";
        btn.disabled = false;
    }
</script>
</body>
</html>
